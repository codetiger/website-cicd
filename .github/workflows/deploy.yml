name: Build & Deploy to Cloudflare Pages

# Deploys ONLY on a push to this repo's main branch or a manual run. Pushes to
# the sub-project repos do not trigger a deploy — to publish updated sub-project
# content, bump its submodule pointer here and push (see README).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Latest commit wins; cancel an in-progress deploy if a newer one starts.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Load the read-only SSH deploy keys BEFORE checkout so the SSH submodule
      # URLs in .gitmodules can be fetched. One key per submodule repo; webfactory
      # maps each to its repo by the key's comment (the submodule's SSH URL).
      # Keys are split across two write-only secrets: SSH_SUBMODULE_KEYS holds the
      # originals (blog/Avarta/resume); SSH_SUBMODULE_KEYS_2 holds tamil + vishwakarma
      # (added later — secrets can't be read back to append, so a 2nd one is used).
      - name: Load submodule SSH deploy keys
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_SUBMODULE_KEYS }}
            ${{ secrets.SSH_SUBMODULE_KEYS_2 }}

      - name: Checkout (recursive submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Rust (wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Build combined site
        env:
          # Public Cloudflare R2 base for Earth-in-Voxels height tiles (manifest.json + tiles/).
          # Set as a repo VARIABLE (not a secret) — empty/unset falls back to build.sh's placeholder.
          VISHWAKARMA_TILE_BASE: ${{ vars.VISHWAKARMA_TILE_BASE }}
          # Same, for the place-name label pyramid (manifest.json + base.bin + tileindex.bin + tiles/).
          # Also a repo VARIABLE — empty/unset falls back to build.sh's live-R2 default.
          VISHWAKARMA_LABELS_BASE: ${{ vars.VISHWAKARMA_LABELS_BASE }}
        run: ./scripts/build.sh

      # Bootstrap: create the Direct Upload Pages project on first deploy, then
      # no-op on every run after (idempotent). Avoids a manual one-time setup step.
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 pages project list | grep -q "codetiger-website" \
            || npx --yes wrangler@4 pages project create codetiger-website --production-branch main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # project-name must match the Pages project created in Cloudflare.
          command: pages deploy dist --project-name=codetiger-website --branch=main
