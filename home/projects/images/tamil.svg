<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Tamil prosody metrical analysis">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12243a"/><stop offset="1" stop-color="#070d16"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="62%">
      <stop offset="0" stop-color="#7ef7c8" stop-opacity=".18"/>
      <stop offset="1" stop-color="#7ef7c8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)"/>
  <rect width="320" height="200" fill="url(#glow)"/>
  <!-- script hint: a faint loop -->
  <path d="M96 150 C60 150 60 96 104 96 C150 96 150 150 112 150 C86 150 90 60 150 58 C214 56 226 118 262 96"
        fill="none" stroke="#ffd166" stroke-opacity=".14" stroke-width="10" stroke-linecap="round"/>
  <!-- scansion: bars = long (ner), dot-pairs = short (nirai) -->
  <g>
    <!-- row 1 -->
    <rect x="87" y="60" width="26" height="7" rx="3.5" fill="#ffd166"/>
    <circle cx="143" cy="63.5" r="5" fill="#7ef7c8"/><circle cx="159" cy="63.5" r="5" fill="#7ef7c8"/>
    <rect x="197" y="60" width="26" height="7" rx="3.5" fill="#ffd166"/>
    <!-- row 2 -->
    <circle cx="85" cy="99.5" r="5" fill="#7ef7c8"/><circle cx="101" cy="99.5" r="5" fill="#7ef7c8"/>
    <rect x="127" y="96" width="26" height="7" rx="3.5" fill="#ffd166"/>
    <circle cx="181" cy="99.5" r="5" fill="#7ef7c8"/><circle cx="197" cy="99.5" r="5" fill="#7ef7c8"/>
    <rect x="223" y="96" width="26" height="7" rx="3.5" fill="#ffd166"/>
    <!-- row 3 -->
    <rect x="95" y="132" width="26" height="7" rx="3.5" fill="#ffd166"/>
    <rect x="145" y="132" width="26" height="7" rx="3.5" fill="#ffd166"/>
    <circle cx="201" cy="135.5" r="5" fill="#7ef7c8"/><circle cx="217" cy="135.5" r="5" fill="#7ef7c8"/>
  </g>
</svg>
